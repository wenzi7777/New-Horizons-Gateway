services:
  gateway:
    build:
      context: .
    container_name: ${NEWHORIZONS_GATEWAY_CONTAINER_NAME:-newhorizons-gateway}
    environment:
      NEWHORIZONS_GATEWAY_CONFIG: /app/data/gateway_config.json
      NEWHORIZONS_GATEWAY_TARGET_MODE: ${NEWHORIZONS_GATEWAY_TARGET_MODE:-}
      NEWHORIZONS_GATEWAY_MANUAL_URL: ${NEWHORIZONS_GATEWAY_MANUAL_URL:-}
      NEWHORIZONS_GATEWAY_TOKEN: ${NEWHORIZONS_GATEWAY_TOKEN:-}
      NEWHORIZONS_GATEWAY_ID: ${NEWHORIZONS_GATEWAY_ID:-}
      NEWHORIZONS_GATEWAY_ENABLED: ${NEWHORIZONS_GATEWAY_ENABLED:-}
      NEWHORIZONS_GATEWAY_UDP_HOST: 0.0.0.0
      NEWHORIZONS_GATEWAY_UDP_PORT: ${NEWHORIZONS_GATEWAY_UDP_PORT:-13250}
      NEWHORIZONS_GATEWAY_DISCOVERY_HOST: 0.0.0.0
      NEWHORIZONS_GATEWAY_DISCOVERY_PORT: ${NEWHORIZONS_GATEWAY_DISCOVERY_PORT:-22346}
      NEWHORIZONS_GATEWAY_DISCOVERY_ENABLED: ${NEWHORIZONS_GATEWAY_DISCOVERY_ENABLED:-1}
      NEWHORIZONS_GATEWAY_DISCOVERY_PRIORITY: ${NEWHORIZONS_GATEWAY_DISCOVERY_PRIORITY:-100}
      NEWHORIZONS_GATEWAY_WEB_HOST: 0.0.0.0
      NEWHORIZONS_GATEWAY_WEB_PORT: ${NEWHORIZONS_GATEWAY_WEB_PORT:-5052}
    ports:
      - "${NEWHORIZONS_GATEWAY_UDP_PORT:-13250}:${NEWHORIZONS_GATEWAY_UDP_PORT:-13250}/udp"
      - "${NEWHORIZONS_GATEWAY_WEB_PORT:-5052}:${NEWHORIZONS_GATEWAY_WEB_PORT:-5052}"
    volumes:
      - newhorizons-gateway-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  newhorizons-gateway-data:
